    function generateProgressBars(scoreObj, colorClass) {
      return Object.entries(scoreObj).map(([key, value]) => `

    function generateBadges(arr) {
      if (!arr || arr.length === 0) return '';
      return arr.map(item => `<span class="px-2.5 py-1 bg-[#f4f1ea] text-slate-700 border border-[#e2dcd0] text-[10px] font-mono tracking-wide rounded-sm whitespace-nowrap">${item}</span>`).join('');

    function getAggregatedFingerprint() {
      const keys = ['conversational_voice', 'emotional_vulnerability', 'introspection_level', 'thematic_cohesion', 'metaphor_strength', 'symbolic_density', 'philosophical_depth', 'image_density', 'narrative_progression', 'end_rhyme_density'];
      const aggregated = keys.map(k => ({ trait: k.replace(/_/g, ' '), score: 0 }));
      if (POEMS_DB.length === 0) return aggregated;
      POEMS_DB.forEach(poem => {
        aggregated[0].score += poem.scores.voice.conversational_voice;
        aggregated[1].score += poem.scores.voice.emotional_vulnerability;
        aggregated[2].score += poem.scores.voice.introspection_level;
        aggregated[3].score += poem.scores.conceptual.thematic_cohesion;
        aggregated[4].score += poem.scores.imagery.metaphor_strength;
        aggregated[5].score += poem.scores.conceptual.symbolic_density;
        aggregated[6].score += poem.scores.conceptual.philosophical_depth;
        aggregated[7].score += poem.scores.imagery.image_density;
        aggregated[8].score += poem.scores.structural.narrative_progression;
        aggregated[9].score += poem.scores.sound.end_rhyme_density;
      });
      return aggregated.map(a => ({ trait: a.trait, score: a.score / POEMS_DB.length }));
    }

    function createRadarChart(data) {
      const size = window.innerWidth < 640 ? 300 : 450;
      const center = size / 2;
      const radius = (size / 2) - 60;
      const maxScore = 10;
      const getCoordinates = (value, angle) => ({
        x: center + (value / maxScore) * radius * Math.cos(angle),
        y: center + (value / maxScore) * radius * Math.sin(angle)
      });
      const points = data.map((d, i) => {
        const angle = (Math.PI * 2 * i) / data.length - Math.PI / 2;
        return getCoordinates(d.score, angle);
      });
      const polygonString = points.map(p => `${p.x},${p.y}`).join(" ");
      let svg = `<div class="flex justify-center items-center w-full"><svg width="${size}" height="${size}" class="overflow-visible font-sans">`;
      [2, 4, 6, 8, 10].forEach(level => {
        const gridPoints = data.map((_, i) => {
          const angle = (Math.PI * 2 * i) / data.length - Math.PI / 2;
          const coords = getCoordinates(level, angle);
          return `${coords.x},${coords.y}`;
        }).join(" ");
        svg += `<polygon points="${gridPoints}" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="${level < 10 ? '4,4' : 'none'}" />`;
      });
      data.forEach((_, i) => {
        const angle = (Math.PI * 2 * i) / data.length - Math.PI / 2;
        const coords = getCoordinates(10, angle);
        svg += `<line x1="${center}" y1="${center}" x2="${coords.x}" y2="${coords.y}" stroke="#cbd5e1" stroke-width="1" />`;
      });
      svg += `<polygon points="${polygonString}" fill="rgba(15, 23, 42, 0.05)" stroke="#1e293b" stroke-width="2" />`;
      points.forEach(p => svg += `<circle cx="${p.x}" cy="${p.y}" r="4" fill="#334155" />`);
      data.forEach((d, i) => {
        const angle = (Math.PI * 2 * i) / data.length - Math.PI / 2;
        const coords = getCoordinates(11.5, angle);
        let anchor = "middle";
        if (Math.cos(angle) > 0.1) anchor = "start";
        if (Math.cos(angle) < -0.1) anchor = "end";
        svg += `<text x="${coords.x}" y="${coords.y + 4}" text-anchor="${anchor}" fill="#64748b" class="text-[10px] sm:text-xs font-semibold tracking-wider capitalize">${d.trait}</text>`;
      });
      svg += `</svg></div>`;
      return svg;
    }

    function drawVisualProfile(canvasId, profile) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;
      const cx = width / 2;
      const cy = height / 2;
      ctx.clearRect(0, 0, width, height);
      if (!profile) return;
      const r = Math.floor((1 - profile.red_channel) * 100); 
      const g = Math.floor((1 - profile.green_channel) * 100);
      const b = Math.floor((1 - profile.blue_channel) * 100);
      const numLines = Math.floor(profile.line_count * 150) + 30;
      const radius = (Math.min(width, height) / 2) * profile.subject_scale;
      const complexity = profile.interaction_count * 10;
      ctx.globalCompositeOperation = 'multiply';
      ctx.lineWidth = profile.stroke_weight * 1.5;
      for (let i = 0; i < numLines; i++) {
        const angle = (i / numLines) * Math.PI * 2 * profile.rotation_from_axis * complexity;
        const dist = radius * (i / numLines) * (profile.radiation_from_center || 0.7);
        const x1 = cx + Math.cos(angle) * dist;
        const y1 = cy + Math.sin(angle) * dist;
        const ctrlX = cx + Math.cos(angle + profile.tilt_shift) * (dist * profile.line_curvature * 2);
        const ctrlY = cy + Math.sin(angle + profile.tilt_shift) * (dist * profile.line_curvature * 2);
        const x2 = cx + Math.cos(angle + Math.PI) * (dist * profile.line_straightness);
        const y2 = cy + Math.sin(angle + Math.PI) * (dist * profile.line_straightness);
        const opacity = Math.max(0.1, (i / numLines) * profile.exposure * 0.5);
        ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${opacity})`;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(ctrlX, ctrlY, x2, y2);
        ctx.stroke();
      }
      if (profile.interaction_count > 0.7) {
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.8, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(0, 0, 0, 0.05)`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    function renderDashboard() {

      return `
        <div class="space-y-6 animate-fade-in max-w-5xl mx-auto pb-10">
          <div class="border-b-2 border-slate-900 pb-4 mb-6"><h2 class="text-3xl font-serif font-bold text-slate-900 tracking-tight mb-2">Corpus Index</h2><p class="text-slate-600 font-mono text-sm">All cataloged texts analyzed and stored.</p></div>
          <div class="print-panel overflow-hidden bg-white"><div class="overflow-x-auto"><table class="w-full text-left text-sm text-slate-800"><thead class="bg-[#f4f1ea] text-slate-900 uppercase text-[10px] font-mono font-bold tracking-widest border-b border-[#e2dcd0]"><tr><th class="px-6 py-4">Ref ID</th><th class="px-6 py-4">Title</th><th class="px-6 py-4">Classification</th><th class="px-6 py-4">Narrative Stance</th><th class="px-6 py-4 text-right">View</th></tr></thead><tbody>${rowsHtml}</tbody></table></div></div>
        </div>
      `;
    }

    function renderRepository() {
      const selectedPoem = POEMS_DB.find(p => p.poem_id === state.readingPoemId) || POEMS_DB[0];
      const tabsHtml = POEMS_DB.map(p => `
        <button onclick="changeRepositoryPoem('${p.poem_id}')" class="text-left px-4 py-3 rounded-sm text-sm transition-all ${p.poem_id === selectedPoem.poem_id ? 'bg-slate-900 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-200 border-b border-slate-200'}">
          <div class="text-[10px] font-mono opacity-60 mb-1">${p.poem_id}</div>
          <div class="font-serif font-bold">${p.title}</div>
        </button>
      `).join('');
      const strongLinesHtml = selectedPoem.strongest_lines ? selectedPoem.strongest_lines.map(line => `
        <div class="bg-[#fdfcf8] border border-slate-200 p-4 relative">
          <div class="absolute -top-2.5 left-4 bg-[#fdfcf8] px-2 text-[10px] uppercase font-mono tracking-widest text-slate-500 font-bold">${line.strength_type}</div>
          <p class="font-serif text-slate-800 italic mt-2">"${line.text}"</p>
        </div>
      `).join('') : '<p class="text-slate-500 italic text-sm">No highlights parsed.</p>';
      return `
        <div class="space-y-6 animate-fade-in flex flex-col md:flex-row gap-8 max-w-7xl mx-auto pb-10">
          <div class="w-full md:w-64 flex flex-col gap-2 shrink-0"><h2 class="text-xl font-serif font-bold text-slate-900 border-b-2 border-slate-900 pb-2 mb-4">Reading Room</h2><div class="space-y-1 flex flex-col">${tabsHtml}</div></div>
          <div class="flex-1 space-y-8">
            <div class="print-panel p-8 md:p-12 min-h-[50vh] bg-white relative">
              <div class="mb-10 text-center border-b border-slate-200 pb-8"><div class="text-xs font-mono text-slate-400 mb-4 tracking-widest uppercase">Document ${selectedPoem.poem_id}</div><h3 class="text-4xl md:text-5xl font-serif font-bold text-slate-900 mb-6">${selectedPoem.title}</h3><div class="flex justify-center gap-6 text-sm text-slate-600 font-serif italic"><span>${selectedPoem.word_count} Words</span><span>${selectedPoem.stanza_count} Stanzas</span></div></div>
              <div class="text-slate-800 font-serif leading-loose whitespace-pre-wrap text-lg max-w-2xl mx-auto">${selectedPoem.text}</div>
              <div class="mt-12 flex justify-center gap-4"><button onclick="goToDeepDive('${selectedPoem.poem_id}')" class="text-slate-600 hover:bg-[#f4f1ea] flex items-center gap-2 text-sm font-medium border border-slate-300 px-6 py-2 transition-colors uppercase tracking-wider font-mono">Read Deep Dive</button><button onclick="goToAnalysis('${selectedPoem.poem_id}')" class="text-white bg-slate-900 hover:bg-slate-800 flex items-center gap-2 text-sm font-medium border-2 border-slate-900 px-6 py-2 transition-colors uppercase tracking-wider font-mono">Inspect Metrics</button></div>
            </div>
            <div class="print-panel p-8 bg-white"><h4 class="text-xs font-bold font-mono text-slate-900 uppercase tracking-widest mb-6 border-b border-slate-200 pb-2">Editorial Highlights</h4><div class="grid grid-cols-1 md:grid-cols-2 gap-6">${strongLinesHtml}</div></div>
          </div>
        </div>
      `;
    }

    function renderDeepDive() {
      const poem = POEMS_DB.find(p => p.poem_id === state.selectedPoemId) || POEMS_DB[0];
      const optionsHtml = POEMS_DB.map(p => `<option value="${p.poem_id}" ${p.poem_id === poem.poem_id ? 'selected' : ''}>${p.title}</option>`).join('');
      const sectionsHtml = poem.deep_dive && poem.deep_dive.length > 0 ? poem.deep_dive.map(sec => `
        <div class="mb-12 last:mb-0"><h3 class="text-xl font-serif font-bold text-slate-900 border-b border-slate-200 pb-2 mb-4">${sec.section}</h3><div class="font-serif text-slate-700 leading-relaxed space-y-4 text-[1.05rem]">${sec.content}</div></div>
      `).join('') : `<div class="text-slate-500 font-serif italic py-10">Literary deep dive not available for this text.</div>`;
      return `
        <div class="space-y-8 animate-fade-in pb-20 max-w-5xl mx-auto">
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 border-b-4 border-slate-900 pb-4">
            <div><div class="flex items-center gap-3 mb-2"><span class="px-2 py-0.5 bg-slate-900 text-white text-[10px] font-mono tracking-widest">${poem.poem_id}</span><h2 class="text-3xl font-serif font-bold text-slate-900 tracking-tight">Literary Deep Dive</h2></div><p class="text-sm text-slate-600 font-serif italic">Prose Analysis & Interpretation of "${poem.title}"</p></div>
            <select onchange="changePoem(this.value)" class="bg-white border-2 border-slate-900 text-slate-900 font-serif font-bold text-sm focus:ring-0 block px-4 py-2 outline-none cursor-pointer">${optionsHtml}</select>
          </div>
          <div class="print-panel p-8 md:p-12 bg-white relative"><div class="absolute top-0 right-8 w-8 h-12 bg-slate-100 border-x border-b border-slate-200 hidden md:block"></div>${sectionsHtml}</div>
        </div>
      `;
    }

    function renderAnalysis() {
      const poem = POEMS_DB.find(p => p.poem_id === state.selectedPoemId) || POEMS_DB[0];
      const optionsHtml = POEMS_DB.map(p => `<option value="${p.poem_id}" ${p.poem_id === poem.poem_id ? 'selected' : ''}>${p.title}</option>`).join('');
      const arcObj = poem.emotional_arc || {};
      const arcData = [{ phase: "Opening", desc: arcObj.opening_state || arcObj.start || "N/A" }, { phase: "Development", desc: arcObj.development || arcObj.peak || "N/A" }, { phase: "Crisis", desc: arcObj.crisis || "N/A" }, { phase: "Turn", desc: arcObj.turn || "N/A" }, { phase: "Ending", desc: arcObj.ending_state || arcObj.resolution || "N/A" }].filter(step => step.desc !== "N/A");
      const arcHtml = arcData.map((step, idx) => `
        <div class="relative pl-6 pb-6 last:pb-0">${idx !== arcData.length - 1 ? `<div class="absolute top-2 left-[7px] w-[1px] h-full bg-slate-300"></div>` : ''}<div class="absolute top-1.5 left-0 w-4 h-4 rounded-full border-2 border-slate-900 bg-white"></div><h4 class="text-[10px] font-mono font-bold uppercase tracking-widest text-slate-900 mb-1">${step.phase}</h4><p class="text-sm text-slate-700 font-serif leading-snug">${step.desc}</p></div>
      `).join('');
      return `
        <div class="space-y-8 animate-fade-in pb-20 max-w-7xl mx-auto">
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 border-b-4 border-slate-900 pb-4">
            <div><div class="flex items-center gap-3 mb-2"><span class="px-2 py-0.5 bg-slate-900 text-white text-[10px] font-mono tracking-widest">${poem.poem_id}</span><h2 class="text-3xl font-serif font-bold text-slate-900 tracking-tight">${poem.title}</h2></div><p class="text-sm text-slate-600 font-serif italic">${poem.style_category} &mdash; ${poem.narrator_mode}</p></div>
            <select onchange="changePoem(this.value)" class="bg-white border-2 border-slate-900 text-slate-900 font-serif font-bold text-sm focus:ring-0 block px-4 py-2 outline-none cursor-pointer">${optionsHtml}</select>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="print-panel p-6 flex flex-col items-center justify-center relative overflow-hidden h-full bg-white"><div class="absolute top-4 left-4 z-10"><h3 class="text-[10px] font-mono font-bold text-slate-500 uppercase tracking-widest">Fig 1. Visual Fingerprint</h3></div><canvas id="gen-canvas" width="280" height="280" class="mt-4 mix-blend-multiply opacity-90"></canvas></div>
            <div class="print-panel p-6 flex flex-col h-full bg-[#fdfcf8]"><h3 class="text-xs font-mono font-bold text-slate-900 uppercase tracking-widest mb-4 border-b border-slate-200 pb-2 shrink-0">Thematic Engine</h3><div class="flex flex-wrap gap-2 mb-6 shrink-0">${generateBadges(poem.themes)}</div><div class="bg-white p-5 border border-slate-200 flex-1 flex flex-col justify-center shadow-sm"><span class="text-slate-900 font-serif font-bold italic block mb-3 text-xl">${poem.primary_engine?.type || "Standard Metaphor"}</span><p class="text-base text-slate-700 font-serif leading-relaxed">${poem.primary_engine?.description || "Engine data not available."}</p></div></div>
            <div class="print-panel p-6 flex flex-col h-full bg-white"><h3 class="text-xs font-mono font-bold text-slate-900 uppercase tracking-widest mb-6 border-b border-slate-200 pb-2 shrink-0">Emotional Trajectory</h3><div class="mt-2 px-2 flex-1 flex flex-col justify-center">${arcHtml}</div></div>
            <div class="print-panel p-6 flex flex-col h-full bg-[#f4f1ea]"><h3 class="text-xs font-mono font-bold text-slate-900 uppercase tracking-widest mb-6 border-b border-[#e2dcd0] pb-2 shrink-0">Symbols Lexicon</h3><div class="space-y-4 flex-1 flex flex-col justify-center">${(poem.symbols || []).map(s => `<div class="text-sm border-l-2 border-slate-900 pl-4 py-1"><span class="text-slate-900 font-serif font-bold block mb-1 text-base">${s.symbol}</span><span class="text-slate-700 font-serif">${s.meaning}</span></div>`).join('')}</div></div>
          </div>
          <div class="pt-8"><h3 class="text-xl font-serif font-bold text-slate-900 border-b-2 border-slate-900 pb-2 mb-6">Quantitative Scoring</h3><div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"><div class="print-panel p-6 bg-white border-t-4 border-t-slate-800"><h3 class="text-[10px] font-mono font-bold text-slate-500 uppercase tracking-widest mb-5">Structure Scores</h3>${generateProgressBars(poem.scores.structural, "bg-slate-800")}</div><div class="print-panel p-6 bg-white border-t-4 border-t-indigo-900"><h3 class="text-[10px] font-mono font-bold text-slate-500 uppercase tracking-widest mb-5">Sound Scores</h3>${generateProgressBars(poem.scores.sound, "bg-indigo-900")}</div><div class="print-panel p-6 bg-white border-t-4 border-t-amber-800"><h3 class="text-[10px] font-mono font-bold text-slate-500 uppercase tracking-widest mb-5">Imagery Scores</h3>${generateProgressBars(poem.scores.imagery, "bg-amber-800")}</div><div class="print-panel p-6 bg-white border-t-4 border-t-rose-800"><h3 class="text-[10px] font-mono font-bold text-slate-500 uppercase tracking-widest mb-5">Voice Scores</h3>${generateProgressBars(poem.scores.voice, "bg-rose-800")}</div><div class="print-panel p-6 bg-white border-t-4 border-t-emerald-800 xl:col-span-2"><h3 class="text-[10px] font-mono font-bold text-slate-500 uppercase tracking-widest mb-5">Conceptual Scores</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-x-8"><div>${generateProgressBars({ philosophical_depth: poem.scores.conceptual.philosophical_depth, argument_structure: poem.scores.conceptual.argument_structure, emotional_complexity: poem.scores.conceptual.emotional_complexity }, "bg-emerald-800")}</div><div>${generateProgressBars({ thematic_cohesion: poem.scores.conceptual.thematic_cohesion, symbolic_density: poem.scores.conceptual.symbolic_density }, "bg-emerald-800")}</div></div></div></div></div>
        </div>
      `;
    }

    function renderCompare() {
      const p1 = POEMS_DB.find(p => p.poem_id === state.comparePoem1Id) || POEMS_DB[0];
      const p2 = POEMS_DB.find(p => p.poem_id === state.comparePoem2Id) || (POEMS_DB[1] || POEMS_DB[0]);
      const options1Html = POEMS_DB.map(p => `<option value="${p.poem_id}" ${p.poem_id === p1.poem_id ? 'selected' : ''}>${p.title}</option>`).join('');
      const options2Html = POEMS_DB.map(p => `<option value="${p.poem_id}" ${p.poem_id === p2.poem_id ? 'selected' : ''}>${p.title}</option>`).join('');
      const keysToCompare = [{ label: "Narrative Progression", val1: p1.scores.structural.narrative_progression, val2: p2.scores.structural.narrative_progression }, { label: "Metaphor Strength", val1: p1.scores.imagery.metaphor_strength, val2: p2.scores.imagery.metaphor_strength }, { label: "Internal Rhyme", val1: p1.scores.sound.internal_rhyme_density, val2: p2.scores.sound.internal_rhyme_density }, { label: "Self Dialogue", val1: p1.scores.voice.self_dialogue, val2: p2.scores.voice.self_dialogue }, { label: "Image Escalation", val1: p1.scores.imagery.image_escalation, val2: p2.scores.imagery.image_escalation }, { label: "Philosophical Depth", val1: p1.scores.conceptual.philosophical_depth, val2: p2.scores.conceptual.philosophical_depth }, { label: "Conversational Voice", val1: p1.scores.voice.conversational_voice, val2: p2.scores.voice.conversational_voice }];
      const compareHtml = keysToCompare.map(item => `
        <div class="mb-6"><div class="flex justify-between text-sm mb-2 font-serif font-bold text-slate-800"><span>${item.label}</span></div><div class="flex h-4 gap-1"><div class="w-1/2 flex justify-end bg-[#f4f1ea] border border-[#e2dcd0]"><div class="bg-slate-800 h-full transition-all duration-1000" style="width: ${(item.val1 / 10) * 100}%"></div></div><div class="w-1/2 bg-[#f4f1ea] border border-[#e2dcd0]"><div class="bg-stone-500 h-full transition-all duration-1000" style="width: ${(item.val2 / 10) * 100}%"></div></div></div><div class="flex justify-between text-[10px] text-slate-500 mt-2 px-2 font-mono"><span>${item.val1}/10</span><span>${item.val2}/10</span></div></div>
      `).join('');
      return `
        <div class="space-y-6 animate-fade-in max-w-6xl mx-auto pb-20">
          <div class="border-b-2 border-slate-900 pb-4 mb-8 text-center"><h2 class="text-3xl font-serif font-bold text-slate-900 mb-2">Differential Analysis</h2><p class="text-slate-600 font-mono text-sm">Side-by-side metric comparison revealing style evolution.</p></div>
          <div class="print-panel p-8 md:p-12 bg-white">
            <div class="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-8 mb-12 pb-8 border-b border-slate-200"><div class="flex items-center gap-3 w-full md:w-auto"><div class="w-4 h-4 bg-slate-800 shrink-0 border border-slate-900"></div><select onchange="changeCompare(1, this.value)" class="bg-white border-2 border-slate-900 text-slate-900 font-serif font-bold text-sm focus:ring-0 block p-2.5 outline-none w-full md:w-56 cursor-pointer">${options1Html}</select></div><div class="text-slate-400 font-serif italic hidden md:block text-lg">vs</div><div class="flex items-center gap-3 w-full md:w-auto"><div class="w-4 h-4 bg-stone-500 shrink-0 border border-stone-600"></div><select onchange="changeCompare(2, this.value)" class="bg-white border-2 border-slate-900 text-slate-900 font-serif font-bold text-sm focus:ring-0 block p-2.5 outline-none w-full md:w-56 cursor-pointer">${options2Html}</select></div></div>
            <div class="max-w-4xl mx-auto">${compareHtml}</div>
          </div>
        </div>
      `;
    }

    function updateNavStyles() {
      const buttons = document.querySelectorAll('.nav-btn');
      const isCollapsed = state.desktopSidebarCollapsed;
      const justifyClass = isCollapsed ? 'justify-center' : 'justify-start';
      buttons.forEach(btn => {
        if (btn.dataset.target === state.activeTab) {
          btn.className = `nav-btn w-full flex items-center ${justifyClass} px-3 py-3 rounded-md text-sm transition-colors bg-white border-l-4 border-slate-900 text-slate-900 shadow-sm`;
        } else {
          btn.className = `nav-btn w-full flex items-center ${justifyClass} px-3 py-3 rounded-md text-sm transition-colors text-slate-600 hover:bg-[#ece8df] hover:text-slate-900 border-l-4 border-transparent`;
        }
      });
    }

    function render() {
      const container = document.getElementById('view-container');
      if (POEMS_DB.length === 0) {
        container.innerHTML = `<div class="flex flex-col items-center justify-center h-[80vh] text-slate-500 font-serif animate-fade-in text-center p-8"><i data-lucide="feather" stroke-width="1" class="w-20 h-20 mb-6 text-[#cbd5e1]"></i><h2 class="text-3xl font-bold text-slate-900 mb-4 font-serif">Awaiting Manuscript</h2><p class="max-w-md text-slate-600 leading-relaxed text-lg">The Poet.Viz dashboard is initialized and ready.</p></div>`;
        updateNavStyles(); lucide.createIcons(); return;
      }
      switch (state.activeTab) {
        case 'dashboard': container.innerHTML = renderDashboard(); break;
        case 'database': container.innerHTML = renderDatabase(); break;
        case 'repository': container.innerHTML = renderRepository(); break;
        case 'deep_dive': container.innerHTML = renderDeepDive(); break;
        case 'analysis': container.innerHTML = renderAnalysis(); setTimeout(() => { const poem = POEMS_DB.find(p => p.poem_id === state.selectedPoemId) || POEMS_DB[0]; drawVisualProfile('gen-canvas', poem.visual_profile); }, 50); break;
        case 'compare': container.innerHTML = renderCompare(); break;
      }
      updateNavStyles(); lucide.createIcons();
    }

    window.navigate = function(tab) { state.activeTab = tab; state.mobileMenuOpen = false; document.getElementById('sidebar').classList.remove('translate-x-0'); document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('mobile-menu-overlay').classList.add('hidden'); render(); };
    window.goToAnalysis = function(poemId) { state.selectedPoemId = poemId; navigate('analysis'); };
    window.goToDeepDive = function(poemId) { state.selectedPoemId = poemId; navigate('deep_dive'); };
    window.changePoem = function(poemId) { state.selectedPoemId = poemId; render(); };
    window.changeRepositoryPoem = function(poemId) { state.readingPoemId = poemId; render(); };
    window.changeCompare = function(slot, poemId) { if (slot === 1) state.comparePoem1Id = poemId; if (slot === 2) state.comparePoem2Id = poemId; render(); };
    window.toggleDesktopSidebar = function() { state.desktopSidebarCollapsed = !state.desktopSidebarCollapsed; const sidebar = document.getElementById('sidebar'); const navTexts = document.querySelectorAll('.nav-text'); const mainNavBtns = document.querySelectorAll('.nav-btn'); const collapseIcon = document.getElementById('collapse-icon'); if (state.desktopSidebarCollapsed) { sidebar.classList.remove('w-64'); sidebar.classList.add('w-20'); navTexts.forEach(el => el.classList.add('hidden')); mainNavBtns.forEach(el => el.classList.add('justify-center')); mainNavBtns.forEach(el => el.classList.remove('justify-start')); collapseIcon.setAttribute('data-lucide', 'chevron-right'); } else { sidebar.classList.add('w-64'); sidebar.classList.remove('w-20'); navTexts.forEach(el => el.classList.remove('hidden')); mainNavBtns.forEach(el => el.classList.remove('justify-center')); mainNavBtns.forEach(el => el.classList.add('justify-start')); collapseIcon.setAttribute('data-lucide', 'chevron-left'); } lucide.createIcons(); };
    window.toggleMobileMenu = function() { state.mobileMenuOpen = !state.mobileMenuOpen; const sidebar = document.getElementById('sidebar'); const overlay = document.getElementById('mobile-menu-overlay'); if (state.mobileMenuOpen) { sidebar.classList.remove('-translate-x-full'); sidebar.classList.add('translate-x-0'); overlay.classList.remove('hidden'); } else { sidebar.classList.add('-translate-x-full'); sidebar.classList.remove('translate-x-0'); overlay.classList.add('hidden'); } };
    window.addEventListener('resize', () => { if(state.activeTab === 'dashboard' || state.activeTab === 'analysis') render(); });
    document.addEventListener('DOMContentLoaded', () => { render(); });
  </script>
</body>
</html>
